name: Autograding Tests

on:
  push:
    branches: ["*"]
  workflow_dispatch:

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run all exercise tests
        run: |
          status=0
          for dir in exercises/*/*/; do
            echo "Running tests in $dir"
            pytest "$dir" --tb=short -q || status=1
          done
          exit $status
